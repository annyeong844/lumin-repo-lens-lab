name: CI

on:
  # Private repo CI minutes are intentionally conserved. Run this manually only
  # for source changes that need the full maintainer suite; release/package
  # smoke coverage runs in the public package repository after publish.
  workflow_dispatch:

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20.x', '22.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run ci
