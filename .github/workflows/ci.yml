name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  test:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20.x', '22.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run ci

  rust:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: Test (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Test cargo oracle
        run: cargo test --locked --manifest-path experiments/rust-main/rust-cargo-oracle/Cargo.toml
      - name: Test Rust source health
        run: cargo test --locked --manifest-path experiments/rust-sidecar/rust-source-health/Cargo.toml
