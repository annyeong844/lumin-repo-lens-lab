name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  changes:
    name: Detect changed surfaces
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
          else
            base="$BEFORE_SHA"
            head="$HEAD_SHA"
          fi

          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            base="$(git rev-parse "${head}^" 2>/dev/null || true)"
          fi

          if [[ -z "$base" ]]; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only "$base" "$head" > changed-files.txt

          rust=false

          if [[ ! -s changed-files.txt ]]; then
            rust=true
          fi

          while IFS= read -r file; do
            case "$file" in
              .github/workflows/ci.yml)
                rust=true
                ;;
              experiments/Cargo.toml|experiments/Cargo.lock|experiments/.cargo/*|experiments/rust-common/*|experiments/rust-main/*|experiments/rust-sidecar/*|tests/fixtures/audit-core-blind-zones/*|tests/fixtures/m7-cargo-json-diagnostic-capture-v4/*|canonical/evidence-ladder.md|canonical/oracle-registry.json|canonical/rust-*)
                rust=true
                ;;
            esac
          done < changed-files.txt

          echo "rust=$rust" >> "$GITHUB_OUTPUT"

  rust:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    name: Test (Rust)
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Check Rust formatting
        working-directory: experiments
        run: cargo lumin-fmt
      - name: Lint unified Rust analyzer
        working-directory: experiments
        run: cargo lumin-clippy
      - name: Test unified Rust analyzer
        working-directory: experiments
        run: cargo lumin-test
