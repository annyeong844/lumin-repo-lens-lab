name: Public Package CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  package-smoke:
    name: Package Smoke (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20.x', '22.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: skills/lumin-repo-lens-lab/package-lock.json
      - name: Install packaged skill dependencies
        working-directory: skills/lumin-repo-lens-lab
        run: npm ci
      - name: Smoke packaged audit CLI
        working-directory: skills/lumin-repo-lens-lab
        run: npm run smoke
      - name: Verify packaged CLI help
        run: node skills/lumin-repo-lens-lab/scripts/audit-repo.mjs --help
      - name: Smoke packaged hook runners
        run: |
          printf '{ bad json' | node hooks/pre-tool-use.mjs
          node -e "process.stdout.write(JSON.stringify({cwd: process.cwd(), session_id: 'sid_public_smoke', tool_name: 'Read', tool_input: {}}))" | node hooks/pre-tool-use.mjs
          node -e "process.stdout.write(JSON.stringify({cwd: process.cwd(), session_id: 'sid_public_smoke', tool_calls: []}))" | node hooks/post-tool-batch.mjs
          node -e "process.stdout.write(JSON.stringify({cwd: process.cwd(), session_id: 'sid_public_smoke', last_assistant_message: ''}))" | node hooks/stop.mjs
          node -e "process.stdout.write(JSON.stringify({cwd: process.cwd(), session_id: 'sid_public_smoke'}))" | node hooks/user-prompt-submit.mjs
